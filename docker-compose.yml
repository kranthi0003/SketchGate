version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: sketchgate-redis
    ports:
      - "6379:6379"
    restart: always

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: sketchgate-ui
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always